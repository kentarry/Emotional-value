<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="暖心夥伴 - 你的專屬情緒價值提供者，三種層級帶給你最溫暖的回應">
    <title>暖心夥伴 💛 你的專屬情緒支持</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
        <div class="ambient-orb orb-4"></div>
    </div>

    <!-- Floating Hearts Container -->
    <div id="floating-hearts" class="floating-hearts"></div>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="header-avatar">
                    <div class="avatar-glow"></div>
                    <div class="avatar-icon">💛</div>
                    <div class="status-dot"></div>
                </div>
                <div class="header-info">
                    <h1 class="header-title">暖心夥伴</h1>
                    <p class="header-subtitle">
                        <span class="online-indicator"></span>
                        隨時在這裡陪伴你 ✨
                    </p>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn" title="切換主題" aria-label="切換主題">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <button id="clear-chat" class="icon-btn" title="清除對話" aria-label="清除對話">
                        <span>🗑️</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Tier Selector -->
        <div class="tier-selector-bar">
            <div class="tier-selector">
                <button class="tier-btn active" data-tier="basic" id="tier-basic">
                    <span class="tier-icon">💬</span>
                    <span class="tier-label">基本</span>
                    <span class="tier-tag free">免費</span>
                </button>
                <button class="tier-btn" data-tier="intermediate" id="tier-intermediate">
                    <span class="tier-icon">💝</span>
                    <span class="tier-label">中階</span>
                    <span class="tier-tag ad">看廣告</span>
                </button>
                <button class="tier-btn" data-tier="advanced" id="tier-advanced">
                    <span class="tier-icon">👑</span>
                    <span class="tier-label">進階</span>
                    <span class="tier-tag ad-count">每3次看廣告</span>
                </button>
            </div>
            <div class="tier-description" id="tier-description">
                <p id="tier-desc-text">簡短溫暖的回應，快速給你一個暖心擁抱 🤗</p>
            </div>
        </div>

        <!-- Persona Selector (下拉選單) -->
        <div class="persona-dropdown-bar">
            <label class="persona-label" for="persona-select">🎭 選擇 AI 角色：</label>
            <select id="persona-select" class="persona-select">
                <!-- JS 動態填入 -->
            </select>
        </div>


        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <!-- Welcome Message -->
            <div class="welcome-section" id="welcome-section">
                <div class="welcome-card">
                    <div class="welcome-emoji">🤗</div>
                    <h2 class="welcome-title">嘿～歡迎來到你的暖心空間</h2>
                    <p class="welcome-text">
                        這裡是屬於你的安全地帶，無論開心、難過、焦慮或是只想找人聊聊，
                        我都會在這裡，給你最溫暖的回應 💛
                    </p>
                    <div class="tier-explain">
                        <div class="tier-explain-item">
                            <span class="te-icon">💬</span>
                            <div>
                                <strong>基本</strong>
                                <p>簡短溫暖的安慰，快速情緒急救</p>
                            </div>
                        </div>
                        <div class="tier-explain-item">
                            <span class="te-icon">💝</span>
                            <div>
                                <strong>中階</strong>
                                <p>深入理解你的心情，給予更貼心的回應</p>
                            </div>
                        </div>
                        <div class="tier-explain-item">
                            <span class="te-icon">👑</span>
                            <div>
                                <strong>進階</strong>
                                <p>專業級情緒支持，像最懂你的知心好友</p>
                            </div>
                        </div>
                    </div>
                    <div class="quick-starters">
                        <button class="starter-chip" data-message="今天被老闆罵了，好委屈...">😢 被老闆罵了</button>
                        <button class="starter-chip" data-message="跟另一半吵架了，心情好差">💔 跟另一半吵架</button>
                        <button class="starter-chip" data-message="考試考砸了，覺得自己好笨">😣 考試考砸了</button>
                        <button class="starter-chip" data-message="最近壓力好大，快撐不住了">😮‍💨 壓力好大</button>
                        <button class="starter-chip" data-message="覺得好孤單，沒有人在意我">🥺 覺得孤單</button>
                        <button class="starter-chip" data-message="今天升職加薪了！超開心！">🎉 分享開心事</button>
                    </div>
                </div>
            </div>

            <!-- Messages will be inserted here -->
            <div id="messages-container" class="messages-container"></div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-avatar">💛</div>
                <div class="typing-bubble">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="message-input" class="message-input" placeholder="想說什麼就說什麼吧～ 💭" rows="1"
                        maxlength="2000" aria-label="輸入訊息"></textarea>
                    <button id="send-btn" class="send-btn" disabled aria-label="發送訊息">
                        <svg class="send-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <p class="input-hint">按 Enter 發送 · Shift+Enter 換行</p>
                    <div class="tier-badge" id="current-tier-badge">
                        <span class="tier-badge-icon">💬</span>
                        <span class="tier-badge-label">基本模式</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- Ad Modal Overlay -->
    <div class="ad-overlay" id="ad-overlay">
        <div class="ad-modal">
            <div class="ad-header">
                <span class="ad-label">📢 贊助廣告</span>
                <div class="ad-timer" id="ad-timer">
                    <span id="ad-countdown">5</span>s 後可跳過
                </div>
            </div>
            <div class="ad-content" id="ad-content">
                <!-- Dynamic ad content inserted here -->
            </div>
            <div class="ad-footer">
                <button class="ad-skip-btn" id="ad-skip-btn" disabled>
                    請等待 <span id="ad-skip-countdown">5</span> 秒...
                </button>
            </div>
            <div class="ad-progress">
                <div class="ad-progress-bar" id="ad-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Mood Feedback Popup -->
    <div class="mood-popup" id="mood-popup">
        <div class="mood-popup-content">
            <p>這個回覆有沒有讓你感覺好一點？</p>
            <div class="mood-options">
                <button class="mood-btn" data-mood="better" title="好多了">😊</button>
                <button class="mood-btn" data-mood="same" title="還好">😐</button>
                <button class="mood-btn" data-mood="worse" title="還是很難過">😢</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="responses.js"></script>
    <script src="main.js"></script>
</body>

</html>
