<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖心夥伴 - 100人模擬測試報告</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 8px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #999; margin-bottom: 30px; }
        .loading { text-align: center; padding: 60px; font-size: 1.3rem; color: #f5af19; }
        .loading .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #333;
            border-top-color: #f5af19; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .summary-card { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; text-align: center;
            border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        .summary-card .value { font-size: 2.5rem; font-weight: 700; margin: 8px 0;
            background: linear-gradient(135deg, #f5af19, #f12711); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .summary-card .label { font-size: 0.85rem; color: #aaa; }

        /* Tier Comparison */
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; padding-left: 12px;
            border-left: 3px solid #f5af19; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.04); border-radius: 12px; overflow: hidden; }
        th { background: rgba(245,175,25,0.15); color: #f5af19; padding: 12px 16px; text-align: left; font-size: 0.9rem; }
        td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        tr:hover td { background: rgba(255,255,255,0.03); }

        /* Score bar */
        .score-bar { display: flex; align-items: center; gap: 8px; }
        .score-bar .bar { flex: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .score-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .score-bar .bar-value { font-size: 0.8rem; color: #ccc; min-width: 36px; }

        /* By Type */
        .type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .type-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px;
            border: 1px solid rgba(255,255,255,0.06); }
        .type-card .type-name { font-weight: 600; margin-bottom: 8px; color: #f5af19; }
        .type-card .type-stat { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }

        /* Conversation Samples */
        .conv-sample { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 16px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05); }
        .conv-input { background: rgba(100,180,255,0.1); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
            font-size: 0.9rem; color: #8ec5fc; }
        .conv-response { background: rgba(245,175,25,0.08); border-radius: 8px; padding: 10px 14px; margin-bottom: 6px;
            font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; color: #f0d090; }
        .conv-meta { display: flex; gap: 12px; font-size: 0.75rem; color: #888; flex-wrap: wrap; }
        .conv-meta .badge { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 4px; }
        .conv-meta .badge.good { background: rgba(100,200,100,0.15); color: #8f8; }
        .conv-meta .badge.bad { background: rgba(200,100,100,0.15); color: #f88; }
        .conv-meta .badge.warn { background: rgba(200,200,100,0.15); color: #ff8; }

        /* Score colors */
        .score-high { color: #4caf50; }
        .score-mid { color: #ffc107; }
        .score-low { color: #f44336; }

        /* Favorite patterns */
        .pattern-list { list-style: none; }
        .pattern-list li { padding: 8px 12px; background: rgba(255,255,255,0.03); margin-bottom: 6px; border-radius: 8px;
            font-size: 0.85rem; line-height: 1.5; }
        .pattern-list li em { color: #f5af19; font-style: normal; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 暖心夥伴 100 人模擬測試報告</h1>
        <p class="subtitle">模擬 15 種個性 × 3 種打字風格，測試回應品質</p>
        <div id="report">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在模擬 100 位使用者的對話...</p>
            </div>
        </div>
    </div>

    <!-- Load all response scripts -->
    <script src="app.js"></script>
    <script src="responses.js"></script>
    <script src="responses_ext.js"></script>
    <script src="responses_ext2.js"></script>
    <script src="responses_ext3.js"></script>
    <script src="responses_ext4.js"></script>
    <script src="personas.js"></script>
    <script src="responses_enhance.js"></script>
    <script src="simulation.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const results = runSimulation();
            const stats = analyzeResults(results);
            renderReport(stats, results);
        }, 500);
    });

    function getScoreClass(score, max) {
        const pct = score / max;
        if (pct >= 0.6) return 'score-high';
        if (pct >= 0.35) return 'score-mid';
        return 'score-low';
    }

    function barColor(score, max) {
        const pct = score / max;
        if (pct >= 0.6) return '#4caf50';
        if (pct >= 0.35) return '#ffc107';
        return '#f44336';
    }

    const ROLE_LABELS = { default: '💛 暖心夥伴', boyfriend: '💙 男朋友', boss: '👔 老闆' };

    function renderReport(stats, results) {
        const el = document.getElementById('report');
        let html = '';

        // === Summary ===
        html += '<div class="summary-grid">';
        html += `<div class="summary-card"><div class="label">測試人物</div><div class="value">100</div><div class="label">15 種個性</div></div>`;
        html += `<div class="summary-card"><div class="label">總測試訊息</div><div class="value">${stats.totalTests}</div><div class="label">× 3角色 × 3層級</div></div>`;
        html += `<div class="summary-card"><div class="label">分類正確率</div><div class="value">${stats.categoryMatchRate}%</div><div class="label">文題相符度</div></div>`;
        // 進階正確率 (default 角色)
        const advAcc = stats.advancedAccuracy.default || '0';
        html += `<div class="summary-card"><div class="label">進階正確率</div><div class="value ${parseFloat(advAcc) >= 99 ? 'score-high' : 'score-low'}">${advAcc}%</div><div class="label">目標 ≥ 99%</div></div>`;
        html += '</div>';

        // === Per-Role × Per-Tier Stats ===
        const roles = ['default', 'boyfriend', 'boss'];
        const tiers = ['basic', 'intermediate', 'advanced'];
        for (const role of roles) {
            html += `<div class="section"><div class="section-title">${ROLE_LABELS[role]} — 三階評分</div>`;
            html += '<table><thead><tr><th>模式</th><th>正確度</th><th>安慰感</th><th>照顧感</th><th>需要感</th><th>品質</th><th>總分</th><th>敷衍</th><th>引怒</th><th>超長</th></tr></thead><tbody>';
            for (const tier of tiers) {
                const s = stats.avgScores[role][tier];
                const brt = stats.byRole[role][tier];
                const labels = {basic:'💬 基本', intermediate:'💝 中階', advanced:'👑 進階'};
                html += `<tr>
                    <td><strong>${labels[tier]}</strong></td>
                    <td><div class="score-bar"><div class="bar"><div class="bar-fill" style="width:${s.r/5*100}%;background:${barColor(s.r,5)}"></div></div><span class="bar-value">${s.r}</span></div></td>
                    <td><div class="score-bar"><div class="bar"><div class="bar-fill" style="width:${s.c/5*100}%;background:${barColor(s.c,5)}"></div></div><span class="bar-value">${s.c}</span></div></td>
                    <td><div class="score-bar"><div class="bar"><div class="bar-fill" style="width:${s.ca/5*100}%;background:${barColor(s.ca,5)}"></div></div><span class="bar-value">${s.ca}</span></div></td>
                    <td><div class="score-bar"><div class="bar"><div class="bar-fill" style="width:${s.n/5*100}%;background:${barColor(s.n,5)}"></div></div><span class="bar-value">${s.n}</span></div></td>
                    <td><div class="score-bar"><div class="bar"><div class="bar-fill" style="width:${s.q/5*100}%;background:${barColor(s.q,5)}"></div></div><span class="bar-value">${s.q}</span></div></td>
                    <td class="${getScoreClass(s.total, 25)}"><strong>${s.total}</strong>/25</td>
                    <td class="${brt.perfunctory > 0 ? 'score-low' : ''}">${brt.perfunctory}</td>
                    <td class="${brt.anger_risk > 0 ? 'score-low' : ''}">${brt.anger_risk}</td>
                    <td class="${brt.too_long > 0 ? 'score-mid' : ''}">${brt.too_long}</td>
                </tr>`;
            }
            html += '</tbody></table></div>';
        }

        // === By Type ===
        html += '<div class="section"><div class="section-title">👥 各個性類型分析</div><div class="type-grid">';
        for (const [type, data] of Object.entries(stats.byType)) {
            html += `<div class="type-card">
                <div class="type-name">${type}</div>
                <div class="type-stat"><span>測試數</span><span>${data.total} 則</span></div>
                <div class="type-stat"><span>分類正確率</span><span class="${getScoreClass(data.matchRate, 100)}">${data.matchRate}%</span></div>
            </div>`;
        }
        html += '</div></div>';

        // === Flagged Responses (敷衍/引怒) ===
        if (stats.flaggedResponses && stats.flaggedResponses.length > 0) {
            html += '<div class="section"><div class="section-title">🚨 問題回應（敷衍/引怒風險）</div>';
            for (const item of stats.flaggedResponses.slice(0, 20)) {
                const flagTags = [];
                if (item.flags.perfunctory) flagTags.push('⚠️ 敷衍');
                if (item.flags.anger_risk) flagTags.push('🔥 引怒風險');
                if (item.flags.too_long) flagTags.push('📏 過長');
                html += `<div class="conv-sample">
                    <div class="conv-input">👤 ${item.personName}：${item.input}</div>
                    <div class="conv-response">🤖 ${item.response}</div>
                    <div class="conv-meta">
                        <span class="badge bad">${flagTags.join(' ')}</span>
                        <span class="badge">角色：${ROLE_LABELS[item.role] || item.role}</span>
                        <span class="badge">模式：${item.tier}</span>
                        <span class="badge ${item.total >= 12 ? 'good' : item.total >= 8 ? 'warn' : 'bad'}">總分：${item.total}/25</span>
                    </div>
                </div>`;
            }
            html += '</div>';
        }

        // === Worst Responses ===
        html += '<div class="section"><div class="section-title">⚠️ 需改善的回應（得分最低前15）</div>';
        for (const item of stats.worstResponses) {
            html += `<div class="conv-sample">
                <div class="conv-input">👤 ${item.personName}（${item.personType}）：${item.input}</div>
                <div class="conv-response">🤖 ${item.response}</div>
                <div class="conv-meta">
                    <span class="badge ${item.categoryMatch ? 'good' : 'bad'}">分類：${item.actual}${item.categoryMatch ? ' ✓' : ' ✗ 期望:'+item.expected}</span>
                    <span class="badge">角色：${ROLE_LABELS[item.role] || item.role}</span>
                    <span class="badge">模式：${item.tier}</span>
                    <span class="badge ${item.total >= 12 ? 'good' : item.total >= 8 ? 'warn' : 'bad'}">總分：${item.total}/25</span>
                    <span class="badge">正確${item.scores.relevance} 安慰${item.scores.comfort} 照顧${item.scores.care} 需要${item.scores.needed} 品質${item.scores.quality}</span>
                </div>
            </div>`;
        }
        html += '</div>';

        // === Best Responses ===
        html += '<div class="section"><div class="section-title">🌟 最佳回應範例（得分最高前10）</div>';
        for (const item of stats.bestResponses) {
            html += `<div class="conv-sample">
                <div class="conv-input">👤 ${item.personName}（${item.personType}）：${item.input}</div>
                <div class="conv-response">🤖 ${item.response}</div>
                <div class="conv-meta">
                    <span class="badge good">分類：${item.actual} ✓</span>
                    <span class="badge">角色：${ROLE_LABELS[item.role] || item.role}</span>
                    <span class="badge">模式：${item.tier}</span>
                    <span class="badge good">總分：${item.total}/25</span>
                    <span class="badge">正確${item.scores.relevance} 安慰${item.scores.comfort} 照顧${item.scores.care} 需要${item.scores.needed} 品質${item.scores.quality}</span>
                </div>
            </div>`;
        }
        html += '</div>';

        // === Sample Conversations (per role) ===
        html += '<div class="section"><div class="section-title">💬 對話樣本：跨角色比較</div>';
        const shown = new Set();
        for (const person of results) {
            if (shown.has(person.type)) continue;
            shown.add(person.type);
            const conv = person.conversations[0];
            html += `<div class="conv-sample">
                <div class="conv-input">👤 ${person.name}（${person.type}）：${conv.input}</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">`;
            for (const role of roles) {
                html += `<div style="flex:1;min-width:260px;">
                    <div style="font-size:0.75rem;color:#888;margin-bottom:4px;">${ROLE_LABELS[role]} — 進階模式</div>
                    <div class="conv-response">${conv.responses[role] ? conv.responses[role].advanced : 'N/A'}</div>
                </div>`;
            }
            html += `</div>
                <div class="conv-meta">
                    <span class="badge ${conv.categoryMatch ? 'good' : 'bad'}">分類：${conv.actualCategory}${conv.categoryMatch ? ' ✓' : ' ✗ 期望:'+conv.expectedCategory}</span>
                    <span class="badge">強度：${conv.intensity}/5</span>
                </div>
            </div>`;
        }
        html += '</div>';

        el.innerHTML = html;
    }
    </script>
</body>
</html>
